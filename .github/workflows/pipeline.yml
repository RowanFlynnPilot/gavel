name: Pipeline & Deploy

on:
  schedule:
    # Every 4 hours — same cadence as the reference instance. Freshly
    # uploaded videos get ~6 caption attempts in the first 24 hours before
    # falling back to agenda-only.
    - cron: '0 */4 * * *'
  workflow_dispatch:
    inputs:
      backfill:
        description: 'Backfill ALL historical meetings (true/false)'
        required: false
        default: 'false'
      days:
        description: 'Process meetings from last N days (ignored if backfill=true)'
        required: false
        default: ''
      roundup:
        description: 'Generate the weekly newsletter roundup now (also auto-runs Mondays)'
        required: false
        default: 'false'

permissions:
  contents: write
  pages: write
  id-token: write
  issues: write

concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  pipeline-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: python -m pip install -r requirements.txt

      - name: Set up Deno
        # yt-dlp needs a JavaScript runtime to solve YouTube's "n challenge".
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend dependencies
        run: npm install
        working-directory: frontend

      - name: Write YouTube cookies
        run: |
          if [ -n "$YOUTUBE_COOKIES" ]; then
            echo "$YOUTUBE_COOKIES" > /tmp/yt-cookies.txt
            echo "Cookies file written."
          else
            echo "No YOUTUBE_COOKIES secret — transcript fetches will rely on the residential fetcher."
          fi
        env:
          YOUTUBE_COOKIES: ${{ secrets.YOUTUBE_COOKIES }}

      - name: Run pipeline
        id: pipeline
        # continue-on-error: an API outage or a named auth/structure failure
        # (exit 1 by design) must not block the site deploy. A post-deploy
        # step re-surfaces the failure so the run still goes red.
        continue-on-error: true
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          YT_COOKIES_FILE: /tmp/yt-cookies.txt
          USE_WHISPER_FALLBACK: "false"
        run: |
          if [ "${{ github.event.inputs.backfill }}" = "true" ]; then
            python -m engine.pipeline --backfill
          elif [ -n "${{ github.event.inputs.days }}" ]; then
            python -m engine.pipeline --days ${{ github.event.inputs.days }}
          else
            python -m engine.pipeline --days 14
          fi

      - name: Ingest residential transcripts
        id: ingest
        continue-on-error: true
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ ! -d transcripts ] || [ -z "$(ls transcripts/*.txt 2>/dev/null)" ]; then
            echo "No transcript files — skipping."
            exit 0
          fi
          for TFILE in transcripts/*.txt; do
            VID=$(basename "$TFILE" .txt)
            echo "Ingesting transcript for: $VID"
            python -m engine.ingest_transcript --video-id "$VID" --transcript "$TFILE"
            echo ""
          done

      - name: Re-publish data
        # Ingest may have cleared injected IDs; publish-only is cheap and
        # idempotent.
        run: python -m engine.pipeline --publish-only

      - name: Generate weekly newsletter roundup
        continue-on-error: true
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ "$(date -u +%u)" = "1" ] || [ "${{ github.event.inputs.roundup }}" = "true" ]; then
            python -m engine.roundup
          else
            echo "Not Monday and roundup not requested — skipping."
          fi

      - name: Generate calendar feed, static pages, digest
        continue-on-error: true
        run: |
          python -m engine.ics --out data/meetings.ics
          python -m engine.pages --out-dir frontend/public
          python -m engine.digest --out frontend/public/digest.png

      - name: Commit state and data
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add -f processed_meetings.json injected_meetings.json || true
          git add -f summaries/ || true
          git add -f data/ || true
          git add -f frontend/public/meetings/ frontend/public/sitemap.xml frontend/public/robots.txt 2>/dev/null || true
          git status --short | head -20
          git diff --staged --quiet || git commit -m "chore: update meetings data [skip ci]"
          git push || true

      - name: Stage runtime config + data for the frontend
        # The frontend fetches instance.json and data/*.json at runtime;
        # assets (avatars, logo) are referenced by instance.json paths.
        run: |
          cp instance.json frontend/public/
          mkdir -p frontend/public/data
          cp data/meetings.json data/upcoming.json frontend/public/data/
          cp data/meetings.ics frontend/public/meetings.ics 2>/dev/null || true
          cp data/roundup.txt data/roundup.html frontend/public/ 2>/dev/null || true
          cp -r assets frontend/public/assets

      - name: Build frontend
        env:
          BASE_PATH: '/gavel/'
        run: npm run build
        working-directory: frontend

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './frontend/dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Maintain agenda-only status issue
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ ! -f agenda_only_report.json ]; then
            echo "No agenda-only report — skipping."
            exit 0
          fi
          COUNT=$(python -c "import json; d=json.load(open('agenda_only_report.json')); print(len(d.get('agenda_only',[])))")
          if [ "$COUNT" = "0" ]; then
            echo "No agenda-only meetings — skipping."
            exit 0
          fi
          BODY=$(python -c "
          import json
          d = json.load(open('agenda_only_report.json'))
          lines = ['## Agenda-Only Meetings Need Transcripts\n']
          lines.append(f'{len(d[\"agenda_only\"])} meeting(s) were summarized from agenda documents only.')
          lines.append('Run the residential fetcher (python -m engine.fetch_transcripts --all --push) to upgrade them.\n')
          lines.append('| Meeting | Source | Status |')
          lines.append('|---------|--------|--------|')
          for m in d['agenda_only']:
              vote = ' (has votes)' if m.get('_source') == 'agenda_with_votes' else ''
              lines.append(f'| [{m[\"title\"]}]({m[\"url\"]}) | {m[\"source\"]} | Agenda only{vote} |')
          print('\n'.join(lines))
          ")
          EXISTING=$(gh issue list --state open --search "Agenda-only meetings need transcripts in:title" --json number --jq '.[0].number // empty')
          TITLE="📋 Agenda-only meetings need transcripts (updated $(date +%Y-%m-%d))"
          if [ -n "$EXISTING" ]; then
            gh issue edit "$EXISTING" --title "$TITLE" --body "$BODY"
          else
            gh issue create --title "$TITLE" --body "$BODY" --label "transcript-needed" 2>/dev/null || \
            gh issue create --title "$TITLE" --body "$BODY"
          fi

      - name: Surface pipeline failures
        # The pipeline/ingest steps use continue-on-error so the site still
        # deploys — this re-fails the run AFTER deploy so named errors
        # (TranscriptAuthError, AdapterStructureError, API outages) stay loud.
        if: steps.pipeline.outcome == 'failure' || steps.ingest.outcome == 'failure'
        run: |
          echo "::error::Pipeline or transcript ingest failed earlier in this run (site still deployed with existing data). Check the step logs — named errors identify cookie refresh vs adapter drift vs API outage."
          exit 1
