<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Meeting Tracker</title>
    <!--
      Deliberately generic shell. Everything instance-specific — title, fonts,
      theme colors, analytics — is injected at runtime by the app after it
      fetches instance.json. Do not add newsroom strings, font links, or
      analytics scripts here.
    -->
    <style>
      *, *::before, *::after { box-sizing: border-box; }
      html, body, #root {
        margin: 0; padding: 0;
        height: 100%;
        background: var(--background, #fff);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
